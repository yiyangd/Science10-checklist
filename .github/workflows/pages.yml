name: Deploy static site to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate course data and application
        run: npm run validate

      - name: Run browser regression suite
        run: npm run test:e2e

      - name: Prepare static site
        shell: bash
        run: |
          rm -rf public
          mkdir public
          cp index.html public/
          cp -R assets js data public/
          cp README.md public/
          cp .nojekyll public/
          cp BCScienceConnections10_Full_Course_Master_Knowledge_Point_Checklist.md public/
          cp BCScienceConnections10_Full_Course_Master_Knowledge_Point_Checklist_Interactive_v2.html public/

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          force_orphan: true
          commit_message: Deploy static site from ${{ github.sha }}
