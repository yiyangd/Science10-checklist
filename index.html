<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Interactive BC Science Connections 10 knowledge point checklist with quiz-gated progress.">
  <title>BC Science Connections 10 — Full Course Knowledge Point Checklist</title>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']],
        processEscapes: true
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="hero-kicker">BC Science Connections 10</p>
      <p class="hero-title">Full Course Knowledge Point Checklist</p>
    </div>
  </header>

  <nav class="app-bar" aria-label="Course progress and controls">
    <div class="app-bar-inner">
      <div class="progress-row">
        <div>
          <strong id="progressText">0 of 572 Knowledge Points completed — 0%</strong>
          <span class="progress-note">Progress saves in this browser</span>
        </div>
        <div class="progress-track" role="progressbar" aria-labelledby="progressText" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="toolbar">
        <div class="search-shell">
          <label class="sr-only" for="searchBox">Search the full checklist</label>
          <input id="searchBox" type="search" autocomplete="off" placeholder="Search units, chapters, concepts, and Knowledge Points">
        </div>
        <button id="expandAll" class="button contextual-control" type="button" hidden>Expand all</button>
        <button id="collapseAll" class="button contextual-control" type="button" hidden>Collapse all</button>
        <button id="resetProgress" class="button button-danger" type="button">Reset progress</button>
      </div>

      <div id="searchPanel" class="search-panel" hidden>
        <div id="searchStatus" class="search-status" aria-live="polite"></div>
        <div id="searchResults" class="search-results"></div>
      </div>
    </div>
  </nav>

  <div id="routeStatus" class="sr-only" aria-live="polite"></div>
  <main id="appView" tabindex="-1" aria-busy="true">
    <div class="loading-state">Loading course…</div>
  </main>

  <div id="quizModal" class="quiz-modal" role="dialog" aria-modal="true" aria-labelledby="quizTitle" aria-describedby="quizSubtitle" hidden>
    <div class="quiz-dialog">
      <header class="quiz-header">
        <div class="quiz-header-row">
          <div>
            <h2 id="quizTitle" tabindex="-1">Knowledge Point Quiz</h2>
            <p id="quizSubtitle" class="quiz-subtitle">Answer all 3 questions correctly to complete this Knowledge Point.</p>
          </div>
          <button id="quizClose" class="icon-button" type="button" aria-label="Close quiz">&times;</button>
        </div>
      </header>
      <form id="quizForm" class="quiz-body"></form>
      <footer class="quiz-actions">
        <button id="quizCancel" class="button" type="button">Close</button>
        <button id="quizRetry" class="button" type="button" hidden>Retry</button>
        <button id="quizSubmit" class="button button-primary" type="submit" form="quizForm">Submit quiz</button>
      </footer>
    </div>
  </div>

  <button id="backToTop" class="back-to-top" type="button" aria-label="Back to top" hidden>&uarr;</button>
  <noscript>This interactive checklist requires JavaScript. The source checklist remains available in the repository as Markdown.</noscript>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
