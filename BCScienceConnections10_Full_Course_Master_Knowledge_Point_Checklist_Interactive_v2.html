<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Redirecting to BC Science Connections 10 Checklist</title>
  <script>
    (function () {
      window.location.replace("./" + window.location.hash);
    }());
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1f2937;
      background: #f6f8fb;
    }
    main {
      max-width: 680px;
      padding: 24px;
      border: 1px solid #dbe4ee;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    a { color: #0f6c81; }
  </style>
</head>
<body>
  <main>
    <h1>Redirecting to the clean checklist URL</h1>
    <p>
      The interactive checklist is now served from the site root.
      <a id="cleanUrl" href="./">Continue to the clean URL</a>.
    </p>
  </main>
  <script>
    document.getElementById("cleanUrl").href = "./" + window.location.hash;
  </script>
</body>
</html>
